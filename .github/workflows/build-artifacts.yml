name: Build Downloadable Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS app
    runs-on: macos-latest
    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 != '' && secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
      KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD || 'temporary-ci-keychain-password' }}
      APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.17.0 Pillow==12.0.0

      - name: Build app
        run: scripts/build_macos_app.sh

      - name: Package unsigned app
        if: env.HAS_APPLE_SIGNING != 'true'
        run: |
          scripts/package_macos_release.sh
          echo "APPLE SIGNING IS NOT CONFIGURED. This build will show a macOS Gatekeeper warning."

      - name: Sign and notarize app
        if: env.HAS_APPLE_SIGNING == 'true'
        run: scripts/notarize_macos_release.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceReader-macOS
          path: |
            VoiceReader-macOS.zip
            VoiceReader-macOS.dmg

  windows-app:
    name: Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows app
        run: dotnet publish windows/VoiceReader.Windows/VoiceReader.Windows.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o publish/windows

      - name: Add release documents
        shell: pwsh
        run: Copy-Item README.md,PRIVACY.md,LICENSE,windows/README.md -Destination publish/windows

      - name: Copy standalone exe
        shell: pwsh
        run: Copy-Item publish/windows/VoiceReader.Windows.exe -Destination VoiceReader-Windows.exe

      - name: Package Windows app
        shell: pwsh
        run: Compress-Archive -Path publish/windows/* -DestinationPath VoiceReader-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceReader-Windows
          path: |
            VoiceReader-Windows.zip
            VoiceReader-Windows.exe

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [macos-app, windows-app]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: VoiceReader-macOS
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: VoiceReader-Windows
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Voice Reader ${{ github.ref_name }}
          body: |
            Готовые сборки Voice Reader.

            macOS:
            - VoiceReader-macOS.zip - app bundle archive
            - VoiceReader-macOS.dmg - drag Voice Reader.app into Applications

            Windows:
            - VoiceReader-Windows.zip
            - VoiceReader-Windows.exe
          files: |
            release-assets/VoiceReader-macOS.zip
            release-assets/VoiceReader-macOS.dmg
            release-assets/VoiceReader-Windows.zip
            release-assets/VoiceReader-Windows.exe
