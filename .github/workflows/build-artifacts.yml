name: Build Downloadable Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.17.0

      - name: Build app
        run: |
          pyinstaller -y --windowed --name "Voice Reader" --add-data "assets/logo.png:assets" main.py
          mkdir -p "release/VoiceReader-macOS"
          cp -R "dist/Voice Reader.app" "release/VoiceReader-macOS/"
          cp README.md PRIVACY.md LICENSE "release/VoiceReader-macOS/"
          ditto -c -k --sequesterRsrc --keepParent "release/VoiceReader-macOS" "VoiceReader-macOS.zip"
          hdiutil create -volname "Voice Reader" -srcfolder "release/VoiceReader-macOS" -ov -format UDZO "VoiceReader-macOS.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceReader-macOS
          path: |
            VoiceReader-macOS.zip
            VoiceReader-macOS.dmg

  windows-app:
    name: Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows app
        run: dotnet publish windows/VoiceReader.Windows/VoiceReader.Windows.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o publish/windows

      - name: Add release documents
        shell: pwsh
        run: Copy-Item README.md,PRIVACY.md,LICENSE,windows/README.md -Destination publish/windows

      - name: Copy standalone exe
        shell: pwsh
        run: Copy-Item publish/windows/VoiceReader.Windows.exe -Destination VoiceReader-Windows.exe

      - name: Package Windows app
        shell: pwsh
        run: Compress-Archive -Path publish/windows/* -DestinationPath VoiceReader-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceReader-Windows
          path: |
            VoiceReader-Windows.zip
            VoiceReader-Windows.exe

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [macos-app, windows-app]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: VoiceReader-macOS
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: VoiceReader-Windows
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Voice Reader ${{ github.ref_name }}
          body: |
            Готовые сборки Voice Reader.

            macOS:
            - VoiceReader-macOS.zip
            - VoiceReader-macOS.dmg

            Windows:
            - VoiceReader-Windows.zip
            - VoiceReader-Windows.exe
          files: |
            release-assets/VoiceReader-macOS.zip
            release-assets/VoiceReader-macOS.dmg
            release-assets/VoiceReader-Windows.zip
            release-assets/VoiceReader-Windows.exe
